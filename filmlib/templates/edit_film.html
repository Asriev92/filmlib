{% extends 'base.html' %}
{% block title %}Редактировать — FilmLib{% endblock %}
{% block content %}
<div style="max-width:680px;">
    <div class="section-head">Редактировать фильм</div>
    <div style="background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:24px;">
        <form method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Название *</label>
                <input type="text" name="title" class="form-control" required value="{{ film.title }}">
            </div>
            <div class="row g-3 mb-3">
                <div class="col-5">
                    <label class="form-label">Год *</label>
                    <input type="number" name="year" class="form-control" min="1888" max="2030" required value="{{ film.year }}">
                </div>
                <div class="col-7">
                    <label class="form-label">Режиссёр</label>
                    <input type="text" name="director" class="form-control" value="{{ film.director }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Жанр</label>
                <select name="genre_id" class="form-select">
                    <option value="">— Не указан —</option>
                    {% for g in genres %}
                    <option value="{{ g.id }}" {% if film.genre_id == g.id %}selected{% endif %}>{{ g.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Описание</label>
                <textarea name="description" class="form-control" rows="4">{{ film.description }}</textarea>
            </div>
            <div class="mb-4">
                <label class="form-label">Новый постер</label>
                <input type="file" name="poster" class="form-control" accept="image/*">
                <small style="color:#aaa;">Оставьте пустым, чтобы не менять</small>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-yellow px-4">Сохранить</button>
                <a href="{{ url_for('film_detail', film_id=film.id) }}" class="btn btn-outline-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
